      description: "The install/update/uninstall status of a piece of content (app,\
        \ file, video, web-xr-link, ca-certificate, wifi-network, or meta-app) assigned\
        \ to a device."
      example:
        deviceId: 123e4567-e89b-12d3-a456-426614174001
        contentType: app
        status: succeeded-install
        statusTimestamp: 2026-04-27T12:00:00.123Z
        errorDescription: ArborXR not set as the device owner
        content:
          type: app
          id: 123e4567-e89b-12d3-a456-426614174000
          name: My App
          packageName: com.example.app
          releaseChannelId: 123e4567-e89b-12d3-a456-426614174002
          targetVersion: 1.2.0
          installedVersion: 1.1.0
      properties:
        deviceId:
          example: 123e4567-e89b-12d3-a456-426614174001
          format: uuid
          type: string
        contentType:
          enum:
          - app
          - file
          - video
          - web-xr-link
          - ca-certificate
          - wifi-network
          - meta-app
          example: app
          type: string
        status:
          enum:
          - pending-install
          - pending-update
          - pending-uninstall
          - waiting-install
          - waiting-update
          - waiting-uninstall
          - in-progress-install
          - in-progress-update
          - in-progress-uninstall
          - succeeded-install
          - succeeded-update
          - succeeded-uninstall
          - succeeded-higher-version-installed
          - failed-install
          - failed-update
          - failed-uninstall
          - unknown
          example: succeeded-install
          type: string
        statusTimestamp:
          example: 2026-04-27T12:00:00.123Z
          format: date-time
          nullable: true
          type: string
        errorDescription:
          description: Human-readable description of the failure when the status is
            one of the failed-* values. Null otherwise.
          example: ArborXR not set as the device owner
          nullable: true
          type: string
        content:
          $ref: "#/components/schemas/GetStatuses_200_response_data_inner_content"
      required:
      - content
      - contentType
      - deviceId
      - errorDescription
      - status
      - statusTimestamp
      type: object
