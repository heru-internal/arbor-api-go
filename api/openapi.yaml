      - BearerAuth: []
      tags:
      - Users
    post:
      description: "Create a new user in your organization. **Best Practice:** For\
        \ most use cases, we recommend using [`CreateUserInvite`](#operation/CreateUserInvite).\
        \ This automatically emails the user a link to set their password and log\
        \ in. Use [`CreateUser`](#operation/CreateUser) only if authentication is\
        \ handled via *SSO*. If used for standard accounts, users will not receive\
        \ an email and must manually navigate to [https://app.arborxr.com](https://app.arborxr.com)\
        \ to trigger a *Forgot Password* flow to access their account."
