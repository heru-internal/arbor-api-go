          - LAST_1_TO_3_DAYS
          - LAST_3_to_7_DAYS
          - LAST_7_TO_14_DAYS
          - LAST_14_TO_30_DAYS
          - LAST_30_TO_60_DAYS
          - OVER_60_DAYS
          - NEVER_ONLINE
