  /statuses:
    get:
      description: "Get a paginated list of install/update/uninstall statuses for\
        \ content (apps, files, videos, web-xr-links, ca-certificates, wifi-networks,\
        \ meta-apps) assigned to devices in the current organization. Mirrors the\
