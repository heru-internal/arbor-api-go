      description: "Get information about the currently authenticated API token, including\
        \ its name, API version, and associated organization."
      operationId: GetTokenInfo
      parameters:
      - explode: false
        in: header
        name: Accept
        required: true
        schema:
          default: application/json
          enum:
          - application/json
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTokenInfo_200_response"
          description: Success
        "401":
          content:
            application/json:
              schema:
                example:
                  message: Unauthorized
                type: object
          description: Unauthorized
      security:
      - BearerAuth: []
      tags:
      - API Info
    servers:
    - url: https://api.xrdm.app/api
  /:
    get:
      description: Get info about the API.
      operationId: GetApiInfo
