          \ array. e.g. `?enrollment_methods[]=value1&enrollment_methods[]=value2`."
        explode: true
        in: query
        name: "enrollment_methods[]"
        required: false
        schema:
          items:
            enum:
            - setup-app
            - meta-hms
            - batch-configuration
            - qr-code
            - configuration-package
            - unknown
            type: string
          minItems: 1
          type: array
        style: form
      - description: "Filter devices by group IDs (null for ungrouped devices). This\
          \ parameter allows you to search for devices that belong to any of the provided\
          \ groups, or sub-groups thereof. The group IDs should be provided as a query-parameter\
          \ array. e.g. `?group_ids[]=value1&group_ids[]=value2`. Use an empty value\
          \ to retrieve ungrouped devices. e.g. `?group_ids[]=&group_ids[]=value2`,\
          \ e.g.2. `?group_ids[]=`."
        explode: true
        in: query
        name: "group_ids[]"
        required: false
        schema:
          items:
            format: uuid
            nullable: true
            type: string
          minItems: 1
          type: array
        style: form
      - description: "Filter devices by device model IDs. This parameter allows you\
          \ to search for devices of any of the provided device models. The device\
          \ model IDs should be provided as a query-parameter array. e.g. `?device_model_ids[]=value1&device_model_ids[]=value2`."
        explode: true
        in: query
        name: "device_model_ids[]"
        required: false
        schema:
          items:
            format: uuid
            type: string
          minItems: 1
          type: array
        style: form
      - description: "Filter devices by device serial numbers. This parameter allows\
          \ you to search for devices of any of the provided device serial numbers.\
          \ The device serial numbers should be provided as a query-parameter array.\
          \ e.g. `?device_serial_numbers[]=value1&device_serial_numbers[]=value2`."
        explode: true
        in: query
        name: "device_serial_numbers[]"
        required: false
        schema:
          items:
